# eBay CSS Selectors Configuration
# Change these when eBay updates their DOM structure
# No code changes or redeployment required

# Search results page
search_result_count: "h1.srp-controls__count-heading span.BOLD"
search_item: "li.s-item"
search_title: "div.s-item__title span[role='heading']"
search_title_fallback: "div.s-item__title"
search_link: "a.s-item__link"
search_price: "span.s-item__price"
search_image: "img.s-item__image-img"
search_shipping: "span.s-item__shipping"
search_condition: "span.SECONDARY_INFO"

# Item detail page
item_title: "h1.x-item-title__mainTitle span"
item_price: "div.x-price-primary span.ux-textspanx--BOLD"
item_price_fallback: "span[itemprop='price']"
item_image: "img.ux-image-magnify__container--original"
item_image_fallback: "div.ux-image-carousel-item img"
item_seller: "span.ux-textspanx--BOLD[data-testid='ux-seller-section__item--seller']"
item_seller_fallback: "div.x-sellercard-atf__info__about-seller a span"
item_condition: "span.ux-icon-text__text[data-testid='ux-icon-text']"
item_condition_fallback: "div.x-item-condition span.ux-textspanx"
