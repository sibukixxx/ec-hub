# eBay輸出転売 自動化システム 設定ファイル

# eBay API
ebay:
  app_id: ""
  cert_id: ""
  dev_id: ""
  user_token: ""
  site: "EBAY_US"  # EBAY_US, EBAY_GB, EBAY_DE, EBAY_JP
  sandbox: true     # 本番環境では false に変更

# LINE Messaging API
line:
  channel_access_token: ""
  user_id: ""  # 通知先ユーザーID

# DeepL API
deepl:
  api_key: ""

# Claude API (メッセージ分類用)
claude:
  api_key: ""
  model: "claude-haiku-4-5-20251001"

# Amazon PA-API
amazon:
  access_key: ""
  secret_key: ""
  partner_tag: ""
  country: "www.amazon.co.jp"

# 楽天 API
rakuten:
  app_id: ""

# Yahoo!ショッピング API
yahoo_shopping:
  app_id: ""  # Yahoo!デベロッパーネットワークで取得したClient ID

# 為替レート API
exchange_rate:
  base_url: "https://api.exchangerate-api.com/v4/latest/USD"
  fallback_urls:
    - "https://open.er-api.com/v6/latest/USD"
    - "https://api.frankfurter.app/latest?from=USD&to=JPY"
  fallback_rate: 150.0  # APIエラー時のフォールバック (USD→JPY)
  cache_ttl_minutes: 60  # レート更新間隔（分）

# データベース
database:
  path: "db/ebay.db"

# パス設定
paths:
  price_model_path: "models/price_model.pkl"
  frontend_dist_path: "frontend/dist"

# スケジューラ
scheduler:
  researcher:
    cron: "0 6,18 * * *"    # 毎日 06:00, 18:00
  order_manager:
    interval_minutes: 30     # 30分毎
  messenger:
    interval_minutes: 15     # 15分毎
  profit_tracker:
    cron: "0 7 * * *"       # 毎日 07:00

# リサーチ設定
research:
  min_margin_rate: 0.30      # 最低利益率 30%
  max_shipping_ratio: 0.50   # 送料が売価の50%超で除外
  min_sold_count_30d: 1      # 過去30日の最低販売実績
  match_threshold: 40        # マッチ採用閾値 (0-100)。旧形式 0.6 も 60 として解釈
  exclude_categories:        # 除外カテゴリ
    - "Food & Beverages"
    - "Health & Beauty"
    - "Batteries"
  max_candidates_per_run: 50

# 出品設定
listing:
  max_daily_listings: 10     # 1日あたりの最大出品数
  limit_warning_threshold: 3 # リミット残りがこの数以下でLINE通知
